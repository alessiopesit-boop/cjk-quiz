// Indice piatto { scriptKey → { script, familyKey } } costruito una volta sola.
// Evita di attraversare la gerarchia ogni volta che serve una scrittura.
const SCRIPT_INDEX = (() => {
  const idx = {};
  Object.entries(DATA).forEach(([familyKey, family]) => {
    Object.entries(family.scripts).forEach(([scriptKey, script]) => {
      idx[scriptKey] = { script, familyKey };
    });
  });
  return idx;
})();

function getScript(scriptKey) { return SCRIPT_INDEX[scriptKey]?.script; }
function scriptLabel(scriptKey, lang) { return getScript(scriptKey)?.label[lang] || scriptKey; }
function allScriptKeys() { return Object.keys(SCRIPT_INDEX); }

let uiLang = 'it';
// active: { [scriptKey]: boolean } — inizialmente tutte le scritture attive
let active = Object.fromEntries(allScriptKeys().map(k => [k, true]));
let score = 0, total = 0;
let current = null;
let answered = false;

function t() { return I18N[uiLang]; }

function activeKeys() { return Object.keys(active).filter(k => active[k]); }

function applyUiLang() {
  document.documentElement.lang = uiLang;
  const meta = UI_LANG_META[uiLang];
  document.getElementById('ui-lang-flag').textContent = meta.flag;
  document.getElementById('ui-lang-label').textContent = meta.label;
  document.getElementById('subtitle').textContent = t().subtitle;
  document.getElementById('title').textContent = t().title;
  document.getElementById('tagline').textContent = t().tagline;
  document.getElementById('next-btn').textContent = t().nextChar;
  document.getElementById('discover-btn').textContent = t().discover;
  renderToggles();
  // se c'è una domanda in corso, aggiorno i label risposte e il feedback
  if (current) refreshAnswerLabels();
  updateScore();
}

function setUiLang(lang) {
  uiLang = lang;
  document.getElementById('ui-lang-menu').classList.remove('open');
  applyUiLang();
}

function toggleLangMenu(e) {
  e.stopPropagation();
  document.getElementById('ui-lang-menu').classList.toggle('open');
}

document.addEventListener('click', () => {
  document.getElementById('ui-lang-menu').classList.remove('open');
});

// Stato accordion: quali famiglie sono espanse. Default: tutte chiuse.
const familyOpen = Object.fromEntries(Object.keys(DATA).map(k => [k, false]));

// Riepilogo stato per una famiglia: { active: N, total: M, allOn, allOff, partial }
function familyStatus(familyKey) {
  const family = DATA[familyKey];
  const scriptKeys = Object.keys(family.scripts);
  const total = scriptKeys.length;
  const activeCount = scriptKeys.filter(k => active[k]).length;
  return {
    active: activeCount,
    total,
    allOn: activeCount === total,
    allOff: activeCount === 0,
    partial: activeCount > 0 && activeCount < total
  };
}

// Quante scritture resterebbero attive se applicassimo `delta` al conteggio attuale
function activeCountAfter(delta) { return activeKeys().length + delta; }

function toggleScript(scriptKey) {
  const wasOn = active[scriptKey];
  // Se sto per spegnere e scenderei sotto 2, rifiuta
  if (wasOn && activeCountAfter(-1) < 2) return;
  active[scriptKey] = !wasOn;
  renderFamilies();
  nextQuestion();
}

function toggleFamily(familyKey) {
  const family = DATA[familyKey];
  const scriptKeys = Object.keys(family.scripts);
  const status = familyStatus(familyKey);

  if (status.allOn) {
    // Sto per spegnere TUTTA la famiglia: verifica vincolo ≥ 2
    if (activeCountAfter(-status.active) < 2) return;
    scriptKeys.forEach(k => { active[k] = false; });
  } else {
    // Accendo tutte le scritture della famiglia
    scriptKeys.forEach(k => { active[k] = true; });
  }
  renderFamilies();
  nextQuestion();
}

function renderFamilies() {
  const el = document.getElementById('families');
  el.innerHTML = '';
  Object.entries(DATA).forEach(([familyKey, family]) => {
    const status = familyStatus(familyKey);
    const isOpen = familyOpen[familyKey];

    const wrapper = document.createElement('div');
    wrapper.className = 'family' + (isOpen ? ' open' : '');

    // Header
    const header = document.createElement('div');
    header.className = 'family-header';
    header.onclick = (e) => {
      // Click sul cerchietto (toggle famiglia) non deve propagarsi all'header
      if (e.target.closest('.family-toggle')) return;
      familyOpen[familyKey] = !familyOpen[familyKey];
      renderFamilies();
    };

    const chevron = document.createElement('span');
    chevron.className = 'family-chevron';
    chevron.textContent = '▶';
    header.appendChild(chevron);

    const name = document.createElement('span');
    name.className = 'family-name';
    name.textContent = family.label[uiLang];
    header.appendChild(name);

    const count = document.createElement('span');
    count.className = 'family-count';
    count.textContent = `${status.active}/${status.total}`;
    header.appendChild(count);

    // Cerchietto toggle famiglia
    const famToggle = document.createElement('button');
    famToggle.className = 'family-toggle';
    if (status.allOn) famToggle.classList.add('all-on');
    else if (status.partial) famToggle.classList.add('partial');
    // Disabilitato se spegnerla farebbe scendere sotto 2
    if (status.allOn && activeCountAfter(-status.active) < 2) {
      famToggle.disabled = true;
    }
    famToggle.title = uiLang === 'it'
      ? (status.allOn ? 'Disattiva tutta la famiglia' : 'Attiva tutta la famiglia')
      : (status.allOn ? 'Disable whole family' : 'Enable whole family');
    famToggle.onclick = (e) => {
      e.stopPropagation();
      toggleFamily(familyKey);
    };
    header.appendChild(famToggle);

    wrapper.appendChild(header);

    // Scritture (visibili solo se l'accordion è aperto, ma renderizzo sempre per stato consistente)
    const scriptsBox = document.createElement('div');
    scriptsBox.className = 'family-scripts';
    Object.keys(family.scripts).forEach(scriptKey => {
      const on = active[scriptKey];
      const item = document.createElement('button');
      item.className = 'script-item' + (on ? ' active' : '');
      // Disabilitato se è acceso e spegnerlo scenderebbe sotto 2
      if (on && activeCountAfter(-1) < 2) item.disabled = true;
      item.onclick = () => toggleScript(scriptKey);

      const cb = document.createElement('span');
      cb.className = 'script-checkbox';
      item.appendChild(cb);

      const label = document.createElement('span');
      label.className = 'script-name';
      label.textContent = scriptLabel(scriptKey, uiLang);
      item.appendChild(label);

      scriptsBox.appendChild(item);
    });
    wrapper.appendChild(scriptsBox);

    el.appendChild(wrapper);
  });
}

// Alias per chi chiamava la vecchia renderToggles
function renderToggles() { renderFamilies(); }

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function nextQuestion() {
  answered = false;
  document.getElementById('next-btn').classList.remove('visible');
  document.getElementById('discover-btn').classList.remove('visible');
  document.getElementById('feedback').textContent = '';

  const keys = activeKeys();
  const lang = pick(keys);
  const charObj = pick(getScript(lang).chars);
  const char = charObj.char;
  // Genero opzioni: corretta + fino a 3 distrattori random tra le scritture attive
  const MAX_OPTIONS = 4;
  const wrong = keys.filter(k => k !== lang).sort(() => Math.random() - 0.5).slice(0, MAX_OPTIONS - 1);
  const optKeys = [lang, ...wrong].sort(() => Math.random() - 0.5);
  current = { lang, char, optKeys };

  document.getElementById('char').textContent = char;
  renderAnswers();
  updateScore();
}

function renderAnswers() {
  const ans = document.getElementById('answers');
  ans.innerHTML = '';
  current.optKeys.forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.dataset.key = k;
    btn.textContent = scriptLabel(k, uiLang);
    btn.onclick = () => checkAnswer(k, ans);
    ans.appendChild(btn);
  });
}

function refreshAnswerLabels() {
  // aggiorna i label delle risposte quando cambia la ui lang a metà
  const ans = document.getElementById('answers');
  Array.from(ans.children).forEach(b => {
    const k = b.dataset.key;
    if (k) b.textContent = scriptLabel(k, uiLang);
  });
  // feedback: se risposta data, rigenera il testo corretto
  const fb = document.getElementById('feedback');
  if (answered && current) {
    // non so se l'utente aveva risposto giusto o sbagliato, derivo dallo stato dei bottoni
    const wrongBtn = ans.querySelector('.ans-btn.wrong');
    if (wrongBtn) {
      fb.textContent = t().wrongWas + scriptLabel(current.lang, uiLang);
    } else {
      fb.textContent = t().correct;
    }
  }
}

function checkAnswer(chosen, container) {
  if (answered) return;
  answered = true;
  total++;
  const correct = chosen === current.lang;
  if (correct) score++;

  Array.from(container.children).forEach(b => {
    b.disabled = true;
    const key = b.dataset.key;
    if (key === current.lang) b.classList.add('correct');
    else if (key === chosen && !correct) b.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  fb.textContent = correct ? t().correct : t().wrongWas + scriptLabel(current.lang, uiLang);
  document.getElementById('next-btn').classList.add('visible');

  const discover = document.getElementById('discover-btn');
  discover.href = `https://${t().wiktionary}.wiktionary.org/wiki/` + encodeURIComponent(current.char);
  discover.classList.add('visible');

  updateScore();
}

function updateScore() {
  const s = document.getElementById('score');
  s.textContent = total > 0 ? t().scoreLabel(score, total) : '';
}

function resetScore() {
  score = 0;
  total = 0;
  updateScore();
}

applyUiLang();
nextQuestion();
