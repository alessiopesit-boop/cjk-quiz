<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz CJK - Riconosci cinese, giapponese e coreano</title>
<meta name="description" content="Quiz interattivo per imparare a distinguere i caratteri cinesi, giapponesi e coreani. CJK sta per Chinese, Japanese, Korean. Scopri l'etimologia e il significato di ogni carattere.">
<meta name="keywords" content="quiz CJK, caratteri cinesi, hiragana, katakana, hangul, kanji, lingue asiatiche, riconoscere cinese giapponese coreano">
<meta name="author" content="CJK Quiz">
<meta name="robots" content="index, follow">
<meta property="og:title" content="Quiz CJK - Riconosci cinese, giapponese e coreano">
<meta property="og:description" content="Quiz interattivo per imparare a distinguere i caratteri delle lingue CJK.">
<meta property="og:type" content="website">
<meta property="og:locale" content="it_IT">
<meta property="og:locale:alternate" content="en_US">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Quiz CJK - Riconosci cinese, giapponese e coreano">
<meta name="twitter:description" content="Quiz interattivo per imparare a distinguere i caratteri CJK.">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #262624;
  --surface: #30302e;
  --surface-hover: #3a3a38;
  --border: #4a4a47;
  --text: #f5f4ed;
  --text-dim: #a8a69e;
  --radius-md: 10px;
  --radius-lg: 14px;
}
html, body { background: var(--bg); min-height: 100vh; }
body { font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif); color: var(--text); }
#app { padding: 2rem 1.5rem 4rem; max-width: 520px; margin: 0 auto; position: relative; }

.topbar { display: flex; justify-content: flex-end; margin-bottom: 1.5rem; }
.lang-select { position: relative; }
.lang-select-btn { display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-md); color: var(--text); font-size: 12px; cursor: pointer; font-family: inherit; transition: background 0.15s; }
.lang-select-btn:hover { background: var(--surface); }
.lang-select-btn .chev { opacity: 0.6; font-size: 10px; }
.lang-menu { position: absolute; top: calc(100% + 4px); right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); min-width: 140px; display: none; z-index: 10; overflow: hidden; }
.lang-menu.open { display: block; }
.lang-option { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: transparent; border: none; color: var(--text); font-size: 13px; cursor: pointer; width: 100%; text-align: left; font-family: inherit; }
.lang-option:hover { background: var(--surface-hover); }
.flag { font-size: 14px; }

.header { margin-bottom: 2.5rem; }
.subtitle { font-size: 12px; color: var(--text-dim); font-weight: 300; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 0.75rem; opacity: 0.8; }
.title { font-size: 28px; font-weight: 200; letter-spacing: -0.01em; line-height: 1.25; color: var(--text); margin-bottom: 0.75rem; }
.tagline { font-size: 13px; font-weight: 300; color: var(--text-dim); line-height: 1.5; opacity: 0.85; }

.lang-toggles { display: flex; gap: 8px; margin-bottom: 2.5rem; }
.lang-btn { flex: 1; padding: 10px 0; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
.lang-btn.active { background: var(--surface); font-weight: 500; }
.lang-btn.disabled-lang { opacity: 0.4; }
.lang-btn:hover { background: var(--surface-hover); }

.char-card { background: var(--surface); border-radius: var(--radius-lg); padding: 3rem 1.5rem; text-align: center; margin-bottom: 2.5rem; min-height: 200px; display: flex; align-items: center; justify-content: center; }
.char-display { font-size: 104px; line-height: 1; user-select: none; font-weight: 300; }

.answers { display: grid; gap: 8px; margin-bottom: 2rem; }
.ans-btn { padding: 14px 16px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; cursor: pointer; transition: all 0.15s; text-align: left; font-family: inherit; }
.ans-btn:hover:not(:disabled) { background: var(--surface); }
.ans-btn.correct { background: #2d3d1f; border-color: #5a8a2e; color: #c5e39a; }
.ans-btn.wrong { background: #3d1f1f; border-color: #8a3030; color: #e39a9a; }
.ans-btn:disabled { cursor: default; }

.feedback { text-align: center; font-size: 14px; color: var(--text-dim); min-height: 20px; margin-bottom: 2rem; }
.next-btn { width: 100%; padding: 12px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 14px; cursor: pointer; font-weight: 500; display: none; font-family: inherit; transition: background 0.15s; }
.next-btn:hover { background: var(--surface-hover); }
.next-btn.visible { display: block; }

.discover-btn { display: none; width: 100%; padding: 10px; border-radius: var(--radius-md); border: 1px solid transparent; background: transparent; color: var(--text-dim); font-size: 13px; cursor: pointer; font-family: inherit; text-decoration: none; text-align: center; margin-top: 10px; transition: all 0.15s; }
.discover-btn:hover { color: var(--text); border-color: var(--border); }
.discover-btn.visible { display: block; }

.score-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 3rem; }
.score { font-size: 13px; color: var(--text-dim); opacity: 0.7; }
.reset-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; transition: all 0.2s; opacity: 0.6; }
.reset-btn:hover { opacity: 1; color: var(--text); transform: rotate(-90deg); }
.reset-btn svg { width: 13px; height: 13px; }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="lang-select">
      <button class="lang-select-btn" id="ui-lang-btn" onclick="toggleLangMenu(event)">
        <span class="flag" id="ui-lang-flag">🇮🇹</span>
        <span id="ui-lang-label">Italiano</span>
        <span class="chev">▾</span>
      </button>
      <div class="lang-menu" id="ui-lang-menu">
        <button class="lang-option" onclick="setUiLang('it')"><span class="flag">🇮🇹</span> Italiano</button>
        <button class="lang-option" onclick="setUiLang('en')"><span class="flag">🇺🇸</span> English</button>
      </div>
    </div>
  </div>

  <div class="header">
    <div class="subtitle" id="subtitle"></div>
    <h1 class="title" id="title"></h1>
    <p class="tagline" id="tagline"></p>
  </div>

  <div class="lang-toggles" id="toggles"></div>
  <div class="char-card"><span class="char-display" id="char">?</span></div>
  <div class="answers" id="answers"></div>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()"></button>
  <a class="discover-btn" id="discover-btn" target="_blank" rel="noopener"></a>
  <div class="score-row">
    <div class="score" id="score"></div>
    <button class="reset-btn" id="reset-btn" onclick="resetScore()" title="Reset">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 3-6.7"/>
        <polyline points="3 4 3 10 9 10"/>
      </svg>
    </button>
  </div>
</div>

<script>
const I18N = {
  it: {
    subtitle: "Seleziona almeno due lingue da indovinare",
    title: "Riconosci la lingua dei caratteri CJK",
    tagline: "CJK è l'acronimo di Chinese, Japanese, Korean: le tre grandi scritture dell'Asia orientale.",
    nextChar: "Prossimo carattere →",
    discover: "Scopri il carattere ↗",
    correct: "✓ Esatto!",
    wrongWas: "✗ Era ",
    scoreLabel: (s, t) => {
      const pct = t > 0 ? Math.round((s / t) * 100) : 0;
      return `${s} / ${t} corretti (${pct}%)`;
    },
    wiktionary: "it"
  },
  en: {
    subtitle: "Select at least two languages to guess",
    title: "Recognize the language of CJK characters",
    tagline: "CJK stands for Chinese, Japanese, Korean — the three great writing systems of East Asia.",
    nextChar: "Next character →",
    discover: "Learn about this character ↗",
    correct: "✓ Correct!",
    wrongWas: "✗ It was ",
    scoreLabel: (s, t) => {
      const pct = t > 0 ? Math.round((s / t) * 100) : 0;
      return `${s} / ${t} correct (${pct}%)`;
    },
    wiktionary: "en"
  }
};

const UI_LANG_META = {
  it: { flag: "🇮🇹", label: "Italiano" },
  en: { flag: "🇺🇸", label: "English" }
};

// Struttura dati:
//   DATA[familyKey] = { label: {it, en}, scripts: { [scriptKey]: ... } }
//   DATA[familyKey].scripts[scriptKey] = { label: {it, en}, chars: [...] }
//
// Ogni carattere è un oggetto. Obbligatorio: `char`.
// Campi opzionali previsti per release future (non usati ora):
//   meaning_it, meaning_en  → significato del carattere
//   category                → "animals" | "numbers" | "days" | ... (futuri filtri)
//   difficulty              → 1 | 2 | 3 (livello difficoltà per carattere)
//   pronunciation           → pinyin (zh) / romaji (ja) / romanization (ko) / ecc.
//   stroke_count            → numero di tratti (per hanzi/kanji)
const DATA = {
  east_asian: {
    label: { it: "Asia orientale", en: "East Asian" },
    scripts: {
      zh: {
        label: { it: "Cinese", en: "Chinese" },
        chars: [
          { char: "你好" }, { char: "我" }, { char: "爱" }, { char: "汉字" },
          { char: "中国" }, { char: "天" }, { char: "地" }, { char: "人" },
          { char: "水" }, { char: "火" }, { char: "山" }, { char: "日" },
          { char: "月" }, { char: "风" }, { char: "雨" }, { char: "学" },
          { char: "书" }, { char: "语" }, { char: "话" }, { char: "文" }
        ]
      },
      ja: {
        label: { it: "Giapponese", en: "Japanese" },
        chars: [
          { char: "あ" }, { char: "の" }, { char: "は" }, { char: "を" },
          { char: "に" }, { char: "が" }, { char: "で" }, { char: "と" },
          { char: "も" }, { char: "か" }, { char: "ね" }, { char: "よ" },
          { char: "な" }, { char: "き" }, { char: "し" }, { char: "り" },
          { char: "て" }, { char: "れ" }, { char: "い" },
          { char: "ひらがな" }, { char: "カタカナ" },
          { char: "ア" }, { char: "ウ" }, { char: "エ" }, { char: "ク" },
          { char: "ス" }, { char: "テ" }, { char: "ト" }, { char: "ノ" }
        ]
      },
      ko: {
        label: { it: "Coreano", en: "Korean" },
        chars: [
          { char: "가" }, { char: "나" }, { char: "다" }, { char: "라" },
          { char: "마" }, { char: "바" }, { char: "사" }, { char: "아" },
          { char: "자" }, { char: "차" }, { char: "카" }, { char: "타" },
          { char: "파" }, { char: "하" },
          { char: "한국어" }, { char: "안녕" }, { char: "사랑" },
          { char: "학교" }, { char: "사람" }, { char: "나라" }
        ]
      }
    }
  }
};

// Indice piatto { scriptKey → { script, familyKey } } costruito una volta sola.
// Evita di attraversare la gerarchia ogni volta che serve una scrittura.
const SCRIPT_INDEX = (() => {
  const idx = {};
  Object.entries(DATA).forEach(([familyKey, family]) => {
    Object.entries(family.scripts).forEach(([scriptKey, script]) => {
      idx[scriptKey] = { script, familyKey };
    });
  });
  return idx;
})();

function getScript(scriptKey) { return SCRIPT_INDEX[scriptKey]?.script; }
function scriptLabel(scriptKey, lang) { return getScript(scriptKey)?.label[lang] || scriptKey; }
function allScriptKeys() { return Object.keys(SCRIPT_INDEX); }

let uiLang = 'it';
// active: { [scriptKey]: boolean } — inizialmente tutte le scritture attive
let active = Object.fromEntries(allScriptKeys().map(k => [k, true]));
let score = 0, total = 0;
let current = null;
let answered = false;

function t() { return I18N[uiLang]; }

function activeKeys() { return Object.keys(active).filter(k => active[k]); }

function applyUiLang() {
  document.documentElement.lang = uiLang;
  const meta = UI_LANG_META[uiLang];
  document.getElementById('ui-lang-flag').textContent = meta.flag;
  document.getElementById('ui-lang-label').textContent = meta.label;
  document.getElementById('subtitle').textContent = t().subtitle;
  document.getElementById('title').textContent = t().title;
  document.getElementById('tagline').textContent = t().tagline;
  document.getElementById('next-btn').textContent = t().nextChar;
  document.getElementById('discover-btn').textContent = t().discover;
  renderToggles();
  // se c'è una domanda in corso, aggiorno i label risposte e il feedback
  if (current) refreshAnswerLabels();
  updateScore();
}

function setUiLang(lang) {
  uiLang = lang;
  document.getElementById('ui-lang-menu').classList.remove('open');
  applyUiLang();
}

function toggleLangMenu(e) {
  e.stopPropagation();
  document.getElementById('ui-lang-menu').classList.toggle('open');
}

document.addEventListener('click', () => {
  document.getElementById('ui-lang-menu').classList.remove('open');
});

function renderToggles() {
  const el = document.getElementById('toggles');
  el.innerHTML = '';
  allScriptKeys().forEach(k => {
    const on = active[k];
    const keys = activeKeys();
    const btn = document.createElement('button');
    btn.className = 'lang-btn' + (on ? ' active' : ' disabled-lang');
    btn.textContent = scriptLabel(k, uiLang);
    btn.onclick = () => {
      if (on && keys.length <= 2) return;
      active[k] = !active[k];
      renderToggles();
      nextQuestion();
    };
    el.appendChild(btn);
  });
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function nextQuestion() {
  answered = false;
  document.getElementById('next-btn').classList.remove('visible');
  document.getElementById('discover-btn').classList.remove('visible');
  document.getElementById('feedback').textContent = '';

  const keys = activeKeys();
  const lang = pick(keys);
  const charObj = pick(getScript(lang).chars);
  const char = charObj.char;
  // salvo le chiavi delle opzioni, non i label tradotti (così cambio lingua al volo)
  const wrong = keys.filter(k => k !== lang);
  const optKeys = [lang, ...wrong].sort(() => Math.random() - 0.5);
  current = { lang, char, optKeys };

  document.getElementById('char').textContent = char;
  renderAnswers();
  updateScore();
}

function renderAnswers() {
  const ans = document.getElementById('answers');
  ans.innerHTML = '';
  current.optKeys.forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.dataset.key = k;
    btn.textContent = scriptLabel(k, uiLang);
    btn.onclick = () => checkAnswer(k, ans);
    ans.appendChild(btn);
  });
}

function refreshAnswerLabels() {
  // aggiorna i label delle risposte quando cambia la ui lang a metà
  const ans = document.getElementById('answers');
  Array.from(ans.children).forEach(b => {
    const k = b.dataset.key;
    if (k) b.textContent = scriptLabel(k, uiLang);
  });
  // feedback: se risposta data, rigenera il testo corretto
  const fb = document.getElementById('feedback');
  if (answered && current) {
    // non so se l'utente aveva risposto giusto o sbagliato, derivo dallo stato dei bottoni
    const wrongBtn = ans.querySelector('.ans-btn.wrong');
    if (wrongBtn) {
      fb.textContent = t().wrongWas + scriptLabel(current.lang, uiLang);
    } else {
      fb.textContent = t().correct;
    }
  }
}

function checkAnswer(chosen, container) {
  if (answered) return;
  answered = true;
  total++;
  const correct = chosen === current.lang;
  if (correct) score++;

  Array.from(container.children).forEach(b => {
    b.disabled = true;
    const key = b.dataset.key;
    if (key === current.lang) b.classList.add('correct');
    else if (key === chosen && !correct) b.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  fb.textContent = correct ? t().correct : t().wrongWas + scriptLabel(current.lang, uiLang);
  document.getElementById('next-btn').classList.add('visible');

  const discover = document.getElementById('discover-btn');
  discover.href = `https://${t().wiktionary}.wiktionary.org/wiki/` + encodeURIComponent(current.char);
  discover.classList.add('visible');

  updateScore();
}

function updateScore() {
  const s = document.getElementById('score');
  s.textContent = total > 0 ? t().scoreLabel(score, total) : '';
}

function resetScore() {
  score = 0;
  total = 0;
  updateScore();
}

applyUiLang();
nextQuestion();
</script>
</body>
</html>
